<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7cb342">
<title>永续田园 · Perpetual Garden</title>
<style>
  :root{
    --wood:#6b4f2a; --wood2:#8a6a3b; --leaf:#7cb342; --cream:#fff7e6;
    --panel:rgba(38,28,18,.82); --panel2:rgba(58,44,28,.92); --gold:#ffd866;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#0e1410;color:var(--cream);
    font-family:"PingFang SC","Microsoft YaHei",system-ui,Segoe UI,Roboto,sans-serif;user-select:none;-webkit-user-select:none}
  canvas{display:block}
  #app{position:fixed;inset:0}

  /* ---------- Loading ---------- */
  #loader{position:fixed;inset:0;background:linear-gradient(160deg,#243a1e,#11201a);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:50;transition:opacity .8s}
  #loader h1{font-size:34px;margin:0;letter-spacing:6px;text-shadow:0 3px 12px rgba(0,0,0,.5)}
  #loader .sub{opacity:.8;font-size:13px;letter-spacing:2px}
  .bar{width:240px;height:8px;border-radius:8px;background:rgba(255,255,255,.15);overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--leaf),var(--gold));transition:width .3s}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:20}
  .topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:8px 14px;backdrop-filter:blur(6px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .chip{display:flex;align-items:center;gap:6px;font-size:14px;white-space:nowrap}
  .chip b{font-weight:700}
  .sep{width:1px;height:20px;background:rgba(255,255,255,.18)}

  .stats{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:8px}
  .stat{display:flex;align-items:center;gap:8px;background:var(--panel);border-radius:12px;padding:6px 10px;border:1px solid rgba(255,255,255,.1)}
  .meter{width:130px;height:12px;border-radius:8px;background:rgba(0,0,0,.35);overflow:hidden}
  .meter>i{display:block;height:100%;width:100%;border-radius:8px;transition:width .25s}
  .e>i{background:linear-gradient(90deg,#9ccc65,#558b2f)}
  .money{position:absolute;top:12px;right:12px;background:var(--panel);border-radius:12px;padding:8px 14px;
    border:1px solid rgba(255,255,255,.1);font-size:16px;font-weight:700}
  .money small{color:var(--gold)}

  /* hotbar */
  #hotbar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:auto}
  .slot{width:60px;height:60px;border-radius:14px;background:var(--panel);border:2px solid rgba(255,255,255,.12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative}
  .slot .ic{font-size:24px;line-height:1}
  .slot .nm{font-size:10px;opacity:.85;margin-top:2px}
  .slot .key{position:absolute;top:2px;left:5px;font-size:9px;opacity:.6}
  .slot.active{border-color:var(--gold);background:var(--panel2);transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,.4)}
  .slot .cnt{position:absolute;bottom:1px;right:4px;font-size:10px;color:var(--gold);font-weight:700}

  .help{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);font-size:12px;opacity:.78;text-align:center;
    background:rgba(0,0,0,.35);padding:5px 12px;border-radius:10px}

  /* bottom-right buttons */
  .sysbtns{position:absolute;bottom:14px;right:12px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
  .sysbtns button{width:46px;height:46px;border-radius:12px;background:var(--panel);color:var(--cream);
    border:1px solid rgba(255,255,255,.14);font-size:20px;cursor:pointer}
  .sysbtns button:active{transform:translateY(1px)}

  /* mobile action button (hidden on non-touch) */
  #actBtn{display:none;position:absolute;bottom:90px;right:18px;width:88px;height:88px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#aed581,#558b2f);color:#173817;font-weight:800;font-size:18px;
    border:3px solid rgba(255,255,255,.5);box-shadow:0 8px 22px rgba(0,0,0,.45);pointer-events:auto;
    flex-direction:column;align-items:center;justify-content:center;line-height:1.1;letter-spacing:1px}
  #actBtn small{font-size:11px;opacity:.7;font-weight:600}
  #actBtn:active{transform:scale(.92)}
  body.touch #actBtn{display:flex}
  /* on touch, lift hotbar a touch and shrink sys buttons row to avoid overlap */
  body.touch .sysbtns{bottom:188px}

  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%);background:var(--panel2);
    padding:8px 16px;border-radius:12px;font-size:14px;opacity:0;transition:opacity .3s;border:1px solid rgba(255,255,255,.14)}
  .toast.show{opacity:1}

  /* ---------- Panels (shop/inventory/menu) ---------- */
  .modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.5);backdrop-filter:blur(3px);pointer-events:auto}
  .modal.show{display:flex}
  .card{width:min(680px,94vw);max-height:86vh;overflow:auto;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:2px solid rgba(255,255,255,.14);border-radius:18px;padding:18px 20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .card h2{margin:0 0 12px;font-size:22px;display:flex;align-items:center;gap:8px}
  .card .x{margin-left:auto;cursor:pointer;font-size:20px;opacity:.7;border:none;background:none;color:var(--cream)}
  .tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .tabs button{background:rgba(0,0,0,.25);color:var(--cream);border:1px solid rgba(255,255,255,.14);
    padding:6px 12px;border-radius:10px;cursor:pointer;font-size:13px}
  .tabs button.on{background:var(--leaf);border-color:var(--leaf);color:#173}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .item{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center}
  .item .em{font-size:30px}
  .item .t{font-size:14px;margin:4px 0 2px;font-weight:600}
  .item .d{font-size:11px;opacity:.7;min-height:28px}
  .item .p{color:var(--gold);font-weight:700;font-size:13px;margin:4px 0}
  .item button{width:100%;background:var(--leaf);border:none;color:#16310f;font-weight:700;padding:6px;border-radius:9px;cursor:pointer;margin-top:4px}
  .item button.sell{background:var(--gold)}
  .item button:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1)}
  .empty{opacity:.6;text-align:center;padding:30px;font-size:14px}

  .startbtn{background:linear-gradient(90deg,var(--leaf),#aed581);border:none;color:#173817;font-weight:800;
    padding:14px 34px;border-radius:14px;font-size:18px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.4);letter-spacing:2px}
  .startbtn:active{transform:translateY(2px)}
  .keys{font-size:13px;line-height:2;opacity:.92}
  .keys kbd{background:rgba(255,255,255,.15);border-radius:6px;padding:1px 8px;border:1px solid rgba(255,255,255,.2);font-family:inherit;margin:0 2px}

  /* night/weather vignette */
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:15;box-shadow:inset 0 0 220px rgba(0,0,20,0);transition:box-shadow 2s}

  @media (max-width:560px){
    .topbar{gap:6px;padding:6px 9px;font-size:12px}
    .chip{font-size:12px}
    .slot{width:50px;height:50px}
    .meter{width:90px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>

<!-- Loading -->
<div id="loader">
  <h1>永 续 田 园</h1>
  <div class="sub">PERPETUAL GARDEN · 3D 农场模拟</div>
  <div class="bar"><i id="loadbar"></i></div>
  <div class="sub" id="loadtip">正在播种世界…</div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="topbar">
    <div class="chip" id="seasonChip">🌸 <b>春</b></div>
    <div class="sep"></div>
    <div class="chip">📅 第 <b id="dayNum">1</b> 天</div>
    <div class="sep"></div>
    <div class="chip" id="clockChip">🕖 <b>06:00</b></div>
    <div class="sep"></div>
    <div class="chip" id="weatherChip">☀️ <b>晴</b></div>
  </div>

  <div class="stats">
    <div class="stat">
      <span>⚡</span>
      <div class="meter e"><i id="energyBar"></i></div>
    </div>
  </div>

  <div class="money">💰 <small id="money">500</small></div>

  <div class="toast" id="toast"></div>

  <div class="help" id="helpText">移动 <b>WASD</b> · 转视角 <b>拖拽鼠标</b> · 使用工具 <b>E</b> · 商店/睡觉 靠近建筑按 <b>E</b></div>

  <div id="hotbar"></div>

  <div class="sysbtns">
    <button id="btnBag" title="背包 (Tab)">🎒</button>
    <button id="btnMenu" title="菜单 (Esc)">☰</button>
  </div>

  <!-- mobile touch controls -->
  <button id="actBtn" title="使用 / 交互">使用<small>E</small></button>
</div>

<!-- Start / Menu modal -->
<div class="modal" id="menuModal">
  <div class="card" style="text-align:center">
    <h2 style="justify-content:center">🌾 永续田园</h2>
    <p style="opacity:.85;font-size:14px;line-height:1.7">
      你从喧嚣的城市来到宁静乡村，继承了一座破败的农场。<br>
      耕作、养殖、建造、探索，把它打造成你的繁荣家园。
    </p>
    <div class="keys" style="text-align:left;display:inline-block;margin:6px auto 16px">
      <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 · <kbd>Shift</kbd> 奔跑</div>
      <div>拖拽鼠标 转动视角 · 滚轮 缩放</div>
      <div><kbd>E</kbd> 使用工具 / 交互 · <kbd>1</kbd>~<kbd>6</kbd> 切换工具</div>
      <div><kbd>Tab</kbd> 背包 · <kbd>Esc</kbd> 菜单</div>
      <div>靠近 🏪 商店 / 🛏️ 床 按 <kbd>E</kbd> 互动</div>
    </div>
    <div>
      <button class="startbtn" id="btnStart">开 始 田 园 生 活</button>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:center">
      <button class="tabs" style="display:none"></button>
      <button id="btnSave" class="tabs" style="background:rgba(0,0,0,.25)">💾 保存进度</button>
      <button id="btnReset" class="tabs" style="background:rgba(0,0,0,.25)">🗑️ 重置存档</button>
    </div>
    <div class="sub" id="saveInfo" style="margin-top:10px;opacity:.6;font-size:12px"></div>
  </div>
</div>

<!-- Shop modal -->
<div class="modal" id="shopModal">
  <div class="card">
    <h2>🏪 乡村商店 <button class="x" data-close="shopModal">✕</button></h2>
    <div class="tabs" id="shopTabs">
      <button class="on" data-tab="buy">🛒 购买</button>
      <button data-tab="sell">💵 出售</button>
    </div>
    <div class="grid" id="shopGrid"></div>
  </div>
</div>

<!-- Inventory modal -->
<div class="modal" id="bagModal">
  <div class="card">
    <h2>🎒 背包 <button class="x" data-close="bagModal">✕</button></h2>
    <div class="grid" id="bagGrid"></div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   永续田园  Perpetual Garden — 3D Farm Simulation (Three.js)
   ============================================================ */

// ---------------- Config / Data ----------------
const GRID = 24;                 // farm grid size (tiles)
const TILE = 2;                  // world size per tile
const HALF = (GRID*TILE)/2;
const DAY_SECONDS = 150;         // real seconds per in-game day
const SEASONS = ['春','夏','秋','冬'];
const SEASON_EMOJI = ['🌸','🦋','🍂','❄️'];
const DAYS_PER_SEASON = 7;

const CROPS = {
  wheat:     {name:'小麦', emoji:'🌾', seedCost:12, sell:25, days:4, seasons:[0,1,2], color:0xe3c75a, tall:1.4},
  carrot:    {name:'胡萝卜', emoji:'🥕', seedCost:15, sell:35, days:3, seasons:[0,2], color:0xe57c2a, tall:0.9},
  potato:    {name:'土豆', emoji:'🥔', seedCost:18, sell:42, days:4, seasons:[0,2], color:0xb98a4a, tall:0.8},
  tomato:    {name:'西红柿', emoji:'🍅', seedCost:25, sell:60, days:5, seasons:[1], color:0xe24a3a, tall:1.6},
  strawberry:{name:'草莓', emoji:'🍓', seedCost:30, sell:70, days:5, seasons:[0], color:0xe23a5a, tall:0.7},
  corn:      {name:'玉米', emoji:'🌽', seedCost:22, sell:55, days:6, seasons:[1,2], color:0xf2d24a, tall:2.0},
  watermelon:{name:'西瓜', emoji:'🍉', seedCost:40, sell:110, days:7, seasons:[1], color:0x3a9a4a, tall:0.8},
  sunflower: {name:'向日葵', emoji:'🌻', seedCost:28, sell:65, days:5, seasons:[1,2], color:0xf2c01a, tall:2.2},
  rose:      {name:'玫瑰', emoji:'🌹', seedCost:35, sell:90, days:6, seasons:[0,1], color:0xd81b60, tall:1.1},
  pumpkin:   {name:'南瓜', emoji:'🎃', seedCost:45, sell:130, days:8, seasons:[2], color:0xe07820, tall:0.9},
};

const TOOLS = [
  {id:'hoe',   name:'锄头', icon:'⛏️', key:'1'},
  {id:'seed',  name:'种子', icon:'🌱', key:'2'},
  {id:'water', name:'水壶', icon:'🪣', key:'3'},
  {id:'hand',  name:'收获', icon:'✋', key:'4'},
  {id:'feed',  name:'喂食', icon:'🌾', key:'5'},
  {id:'build', name:'建造', icon:'🔨', key:'6'},
];

const BUILDABLES = {
  fence:    {name:'木栅栏', emoji:'🪵', cost:20, h:1.0},
  lantern:  {name:'灯笼',   emoji:'🏮', cost:35, h:1.6},
  flower:   {name:'花坛',   emoji:'🌷', cost:25, h:0.4},
  scarecrow:{name:'稻草人', emoji:'🧍', cost:60, h:2.0},
};

// ---------------- Game State ----------------
const S = {
  money:500, energy:100, day:1, season:0, time:6/24, // time fraction of day (0..1)
  weather:'晴', tool:'hoe', seedSel:'wheat', buildSel:'fence',
  tiles:{},            // key "x_z" -> {state:'grass|tilled|watered', crop, stage, watered, dead}
  inventory:{},        // itemKey -> count  (seeds: seed_wheat ; crops: crop_wheat ; goods: egg, milk, wool)
  seeds:{},            // seedKey -> count (seed_<crop>)
  animals:[],          // {mesh, type, pos, affection, productTimer, hasProduct}
  placed:[],           // {mesh, type, x,z}
  paused:false, started:false,
};

// give starter seeds
S.seeds = {seed_wheat:8, seed_carrot:4, seed_potato:0, seed_tomato:0, seed_strawberry:0,
           seed_corn:0, seed_watermelon:0, seed_sunflower:0, seed_rose:0, seed_pumpkin:0};
S.inventory = {};

const tileKey = (x,z)=>x+'_'+z;
function getTile(x,z){ const k=tileKey(x,z); if(!S.tiles[k]) S.tiles[k]={state:'grass',crop:null,stage:0,watered:false,dead:false}; return S.tiles[k]; }

// ---------------- Three.js Setup ----------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfe3ff, 40, 130);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);

// lights
const hemi = new THREE.HemisphereLight(0xcfe8ff, 0x4a6b3a, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff3d0, 2.0);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 160;
sun.shadow.camera.left=-60; sun.shadow.camera.right=60; sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60;
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(sun.target);
const moon = new THREE.DirectionalLight(0x9fb8ff, 0.0);
scene.add(moon);

// sky dome (vertex-colored gradient)
const skyGeo = new THREE.SphereGeometry(300, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side:THREE.BackSide,
  uniforms:{ top:{value:new THREE.Color(0x3a7bd5)}, bot:{value:new THREE.Color(0xcfe8ff)}, off:{value:0.0} },
  vertexShader:`varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vp; uniform vec3 top; uniform vec3 bot; uniform float off;
    void main(){ float h=normalize(vp).y*0.5+0.5+off; h=clamp(h,0.0,1.0); gl_FragColor=vec4(mix(bot,top,h),1.0);} `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// stars (visible at night)
const starGeo = new THREE.BufferGeometry();
const starN = 600, starPos=[];
for(let i=0;i<starN;i++){
  const r=260, u=Math.random(), v=Math.random();
  const th=2*Math.PI*u, ph=Math.acos(2*v-1);
  const y=r*Math.cos(ph);
  if(y<10) continue;
  starPos.push(r*Math.sin(ph)*Math.cos(th), y, r*Math.sin(ph)*Math.sin(th));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:1.4, transparent:true, opacity:0});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ---------------- Ground & Terrain ----------------
const groundMat = new THREE.MeshStandardMaterial({color:0x6aa84f, roughness:1});
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400,400,1,1), groundMat);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; ground.position.y=0;
scene.add(ground);

// rolling hills (decorative low-poly bumps in the distance)
function makeHill(x,z,r,h,col){
  const g=new THREE.SphereGeometry(r,10,8,0,Math.PI*2,0,Math.PI/2);
  const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:col,roughness:1,flatShading:true}));
  m.position.set(x,-r*0.1,z); m.scale.y=h; m.receiveShadow=true; scene.add(m);
}
for(let i=0;i<14;i++){
  const a=Math.random()*Math.PI*2, d=90+Math.random()*70;
  makeHill(Math.cos(a)*d, Math.sin(a)*d, 18+Math.random()*22, .35+Math.random()*.4,
    new THREE.Color().setHSL(.28+Math.random()*.06,.4,.4+Math.random()*.1).getHex());
}
// distant snow mountains
for(let i=0;i<6;i++){
  const a=(i/6)*Math.PI*2, d=200;
  const m=new THREE.Mesh(new THREE.ConeGeometry(45,70,5),
    new THREE.MeshStandardMaterial({color:0xdfe9f2,roughness:1,flatShading:true}));
  m.position.set(Math.cos(a)*d,18,Math.sin(a)*d); scene.add(m);
}

// river (simple reflective-ish plane)
const river = new THREE.Mesh(new THREE.PlaneGeometry(8,400),
  new THREE.MeshStandardMaterial({color:0x4aa6c8, roughness:0.2, metalness:0.1, transparent:true, opacity:0.85}));
river.rotation.x=-Math.PI/2; river.position.set(-HALF-14,0.05,0); scene.add(river);

// forest edge (trees ring around farm)
const treeMatLeaf = new THREE.MeshStandardMaterial({color:0x4e8c3a, roughness:1, flatShading:true});
const treeMatTrunk= new THREE.MeshStandardMaterial({color:0x6b4a2a, roughness:1});
const treeLeafMats=[]; // keep refs for season tint
function makeTree(x,z,s=1){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3*s,0.45*s,2.4*s,6), treeMatTrunk);
  trunk.position.y=1.2*s; trunk.castShadow=true; g.add(trunk);
  const lm = treeMatLeaf.clone(); treeLeafMats.push(lm);
  for(let i=0;i<3;i++){
    const c=new THREE.Mesh(new THREE.IcosahedronGeometry((1.6-i*0.35)*s,0), lm);
    c.position.y=(2.6+i*1.0)*s; c.castShadow=true; g.add(c);
  }
  g.position.set(x,0,z); scene.add(g); return g;
}
for(let i=0;i<60;i++){
  const a=Math.random()*Math.PI*2, d=HALF+8+Math.random()*40;
  const x=Math.cos(a)*d, z=Math.sin(a)*d;

// crops container
const cropMeshes = {}; // key -> Group

function buildCropMesh(crop, stage){
  const c = CROPS[crop];
  const g = new THREE.Group();
  const grow = stage/ (c.days); // 0..1 (stage can equal days = mature)
  const matured = stage>=c.days;
  const h = Math.max(0.15, c.tall*Math.min(1,grow+0.05));
  if(stage===0){ // seed mound
    const s=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,5), new THREE.MeshStandardMaterial({color:0x7a5a3a}));
    s.position.y=0.18; g.add(s); return g;
  }
  // stem
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.09,h,5),
    new THREE.MeshStandardMaterial({color:0x4e8c3a,roughness:1}));
  stem.position.y=h/2+0.12; stem.castShadow=true; g.add(stem);
  // leaves
  for(let i=0;i<3;i++){
    const lf=new THREE.Mesh(new THREE.SphereGeometry(0.18*Math.min(1,grow+0.3),5,4),
      new THREE.MeshStandardMaterial({color:0x5aa83a,roughness:1,flatShading:true}));
    lf.scale.set(1,0.4,1.6);
    lf.position.set(Math.cos(i*2.1)*0.18, 0.2+h*0.5*Math.random(), Math.sin(i*2.1)*0.18);
    g.add(lf);
  }
  // fruit/flower at maturity
  if(grow>0.6 || matured){
    const fc=new THREE.MeshStandardMaterial({color:c.color,roughness:0.6,
      emissive:new THREE.Color(c.color).multiplyScalar(matured?0.12:0)});
    const fruit=new THREE.Mesh(new THREE.SphereGeometry(matured?0.28:0.16,8,7), fc);
    fruit.position.y=h+0.12; fruit.castShadow=true; g.add(fruit);
    if(crop==='sunflower'||crop==='rose'){ // petals
      for(let i=0;i<8;i++){
        const p=new THREE.Mesh(new THREE.SphereGeometry(matured?0.14:0.08,5,4), fc);
        p.scale.set(1,0.3,2);
        p.position.set(Math.cos(i/8*6.28)*0.3, h+0.12, Math.sin(i/8*6.28)*0.3);
        g.add(p);
      }
    }
  }
  return g;
}

function refreshTileVisual(x,z){
  const k=tileKey(x,z); const t=getTile(x,z); const pos=worldFromTile(x,z);
  // soil
  if(t.state==='grass'){
    if(tileMeshes[k]){ scene.remove(tileMeshes[k]); delete tileMeshes[k]; }
  } else {
    if(!tileMeshes[k]){
      const m=new THREE.Mesh(soilGeo, soilMatDry); m.position.copy(pos); m.position.y=0.12; m.receiveShadow=true;
      scene.add(m); tileMeshes[k]=m;
    }
    tileMeshes[k].material = (t.state==='watered'||t.watered)?soilMatWet:soilMatDry;
  }
  // crop
  if(cropMeshes[k]){ scene.remove(cropMeshes[k]); delete cropMeshes[k]; }
  if(t.crop && !t.dead){
    const cm=buildCropMesh(t.crop, t.stage); cm.position.copy(pos); scene.add(cm); cropMeshes[k]=cm;
  } else if(t.dead){
    const d=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.4,4),
      new THREE.MeshStandardMaterial({color:0x6b5a3a})); d.position.copy(pos); d.position.y=0.3;
    d.rotation.z=0.4; scene.add(d); cropMeshes[k]=d;
  }
}

let actx; const sndOn=()=>true;
function tone(type,f,dur,vol=0.15,when=0){
  if(!actx) return;
  const t0=actx.currentTime+when; const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=f; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0+dur+0.02);
}

const scaleNotes=[262,294,330,392,440,523,587]; // C major-ish
function ambientMusic(dt){
  if(!actx) return;

    const n=scaleNotes[Math.floor(Math.random()*scaleNotes.length)] * (night?0.5:1);

}

// camera orbit
let camYaw=Math.PI, camPitch=0.5, camDist=12, dragging=false, lastX=0,lastY=0;
const dom=renderer.domElement;
dom.addEventListener('pointerdown',e=>{ if(e.pointerType==='touch') return; dragging=true; lastX=e.clientX; lastY=e.clientY; });
addEventListener('pointerup',()=>dragging=false);
addEventListener('pointermove',e=>{
  if(e.pointerType==='touch') return;
  if(!dragging) return;
  camYaw -= (e.clientX-lastX)*0.005; camPitch -= (e.clientY-lastY)*0.005;
  camPitch=Math.max(0.12,Math.min(1.3,camPitch)); lastX=e.clientX; lastY=e.clientY;
});
dom.addEventListener('wheel',e=>{ camDist=Math.max(6,Math.min(22,camDist+e.deltaY*0.01)); e.preventDefault(); },{passive:false});
// touch joystick (left half move, right half rotate)
let touchMove=null, touchLook=null;
dom.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(t.clientX<innerWidth/2 && !touchMove) touchMove={id:t.identifier,ox:t.clientX,oy:t.clientY,dx:0,dy:0};
    else if(!touchLook) touchLook={id:t.identifier,x:t.clientX,y:t.clientY};
  }
},{passive:true});
dom.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(touchMove&&t.identifier===touchMove.id){ touchMove.dx=t.clientX-touchMove.ox; touchMove.dy=t.clientY-touchMove.oy; }
    if(touchLook&&t.identifier===touchLook.id){ camYaw-=(t.clientX-touchLook.x)*0.006; camPitch=Math.max(0.12,Math.min(1.3,camPitch-(t.clientY-touchLook.y)*0.006)); touchLook.x=t.clientX; touchLook.y=t.clientY; }
  }
},{passive:true});
dom.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(touchMove&&t.identifier===touchMove.id) touchMove=null;
    if(touchLook&&t.identifier===touchLook.id) touchLook=null;
  }
},{passive:true});

function targetTile(){
  // tile in front of player
  const fx=player.position.x+Math.sin(playerFacing)*TILE;
  const fz=player.position.z+Math.cos(playerFacing)*TILE;
  const tx=Math.floor((fx+HALF)/TILE), tz=Math.floor((fz+HALF)/TILE);
  if(tx<0||tz<0||tx>=GRID||tz>=GRID) return null;
  return {tx,tz};
}

// ---------------- Interaction ----------------
function interact(){
  if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  // building interactions first
  for(const z of interactZones){ if(player.position.distanceTo(z.pos)<z.r){ z.action(); return; } }
  // animal interaction (feed / pet / collect)
  let nearest=null,nd=2.4;
  for(const a of S.animals){ const d=player.position.distanceTo(a.mesh.position); if(d<nd){nd=d;nearest=a;} }
  if(nearest){
    if(S.tool==='feed'){ feedAnimal(nearest); return; }
    if(nearest.hasProduct){ collectProduct(nearest); return; }
    petAnimal(nearest); return;
  }
  // tile tools
  const t=targetTile(); if(!t) { toast('那里不能操作'); return; }
  useTool(t.tx,t.tz);
}

function useTool(x,z){
  const tile=getTile(x,z);
  if(S.tool==='hoe'){
    if(tile.state==='grass'){ if(!spendEnergy(2))return; tile.state='tilled'; refreshTileVisual(x,z); SFX.till(); }
    else if(tile.crop){ tile.crop=null; tile.stage=0; tile.dead=false; tile.state='tilled'; refreshTileVisual(x,z); toast('已清理'); }
    else toast('这里已经是耕地');
  }
  else if(S.tool==='seed'){
    if(tile.state!=='tilled'&&tile.state!=='watered'){ toast('请先用锄头犁地'); SFX.no(); return; }
    if(tile.crop){ toast('这格已种植'); return; }
    const sk='seed_'+S.seedSel; if((S.seeds[sk]||0)<=0){ toast('没有'+CROPS[S.seedSel].name+'种子了 (商店购买)'); SFX.no(); return; }
    const c=CROPS[S.seedSel];
    if(!c.seasons.includes(S.season) && !inGreenhouse(x,z)){ toast(CROPS[S.seedSel].name+'不适合本季节种植'); SFX.no(); return; }
    if(!spendEnergy(1)) return;
    S.seeds[sk]--; tile.crop=S.seedSel; tile.stage=0; tile.watered=false; tile.dead=false;
    refreshTileVisual(x,z); SFX.plant(); renderHotbar();
  }
  else if(S.tool==='water'){
    if(!tile.crop){ toast('这里没有作物'); return; }
    if(tile.watered){ toast('已浇过水'); return; }
    if(!spendEnergy(1)) return;
    tile.watered=true; tile.state='watered'; refreshTileVisual(x,z); SFX.water(); splash(worldFromTile(x,z));
  }
  else if(S.tool==='hand'){
    if(tile.crop && tile.stage>=CROPS[tile.crop].days && !tile.dead){ harvest(x,z); }
    else if(tile.dead){ tile.crop=null;tile.dead=false;tile.state='tilled'; refreshTileVisual(x,z); toast('清理了枯萎作物'); }
    else toast('还未成熟');
  }
  else if(S.tool==='build'){
    placeBuild(x,z);
  }
}

function inGreenhouse(x,z){
  const w=worldFromTile(x,z); return w.distanceTo(new THREE.Vector3(-HALF+6,0,-HALF+8))<4;
}

function harvest(x,z){
  const tile=getTile(x,z); const c=CROPS[tile.crop];
  // quality based on watering history + random
  const roll=Math.random()+(tile.qualityBonus||0);
  let q='普通', mult=1, qkey='';
  if(roll>1.3){ q='完美'; mult=2; qkey='⭐⭐'; } else if(roll>0.8){ q='优质'; mult=1.5; qkey='⭐'; }
  const ck='crop_'+tile.crop;
  S.inventory[ck]=(S.inventory[ck]||0)+1;
  S.inventory[ck+'_q']=Math.max(S.inventory[ck+'_q']||0, mult); // remember best quality seen (simplified)
  tile.crop=null; tile.stage=0; tile.watered=false; tile.state='tilled';
  refreshTileVisual(x,z); SFX.harvest(); harvestPop(worldFromTile(x,z), c.color);
  toast(`收获 ${c.emoji} ${c.name} ${qkey} (${q})`);
  addXP();
}

function placeBuild(x,z){
  const b=BUILDABLES[S.buildSel];
  if(S.money<b.cost){ toast('金币不足'); SFX.no(); return; }
  const w=worldFromTile(x,z);
  // prevent overlap
  for(const p of S.placed){ if(Math.abs(p.x-x)<1&&Math.abs(p.z-z)<1){ toast('这里已有装饰'); return; } }
  S.money-=b.cost; updateHUD(); SFX.coin();
  let m;
  if(S.buildSel==='fence'){ m=box(TILE*0.9,1.0,0.18,0x8a6a3b); m.position.set(w.x,0.5,w.z); }
  else if(S.buildSel==='lantern'){ m=new THREE.Group(); const post=box(0.12,1.4,0.12,0x4a3a2a); post.position.y=0.7; m.add(post);
    const lamp=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,7), new THREE.MeshStandardMaterial({color:0xff8a3a,emissive:0xff7a2a,emissiveIntensity:0.6})); lamp.position.y=1.5; m.add(lamp);
    const lt=new THREE.PointLight(0xff9a4a,0,6); lt.position.y=1.5; m.add(lt); m.userData.light=lt; m.position.set(w.x,0,w.z); }
  else if(S.buildSel==='flower'){ m=new THREE.Group(); const bedm=box(TILE*0.8,0.3,TILE*0.8,0x6b4a2a); bedm.position.y=0.15; m.add(bedm);
    for(let i=0;i<6;i++){ const f=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,5), new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),0.7,0.6)})); f.position.set((Math.random()-0.5)*1,0.4,(Math.random()-0.5)*1); m.add(f);} m.position.set(w.x,0,w.z); }
  else if(S.buildSel==='scarecrow'){ m=new THREE.Group(); const pole=box(0.12,2,0.12,0x6b4a2a); pole.position.y=1; m.add(pole);
    const cross=box(1.2,0.12,0.12,0x6b4a2a); cross.position.y=1.4; m.add(cross);
    const hd=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,7), new THREE.MeshStandardMaterial({color:0xd9b066})); hd.position.y=1.9; m.add(hd); m.position.set(w.x,0,w.z); }
  addShadow(m); scene.add(m);
  S.placed.push({mesh:m,type:S.buildSel,x,z});
  toast(`建造了 ${b.emoji} ${b.name}`);
}

function spendEnergy(n){ if(S.energy<n){ toast('能量不足，去睡觉或井边休息'); SFX.no(); return false; } S.energy-=n; updateHUD(); return true; }
let xp=0, level=1;

// ---------------- Day / season / sleep ----------------
function newDay(){
  S.day++;
  // crops grow if watered
  for(const k in S.tiles){
    const t=S.tiles[k];
    if(t.crop && !t.dead){
      const c=CROPS[t.crop];
      if(t.watered){ t.stage=Math.min(c.days,t.stage+1); t.qualityBonus=(t.qualityBonus||0)+0.12; }
      else { t.missedWater=(t.missedWater||0)+1; if(t.missedWater>=2){ t.dead=true; } }
      t.watered=false; if(t.state==='watered') t.state='tilled';
      const [x,z]=k.split('_').map(Number); refreshTileVisual(x,z);
    }
  }
  // season change
  if((S.day-1)%DAYS_PER_SEASON===0 && S.day>1){ S.season=(S.season+1)%4; applySeason(); toast('🍃 季节更替：'+SEASONS[S.season]); }
  // weather roll
  rollWeather();
  // animal products
  for(const a of S.animals){
    let chance=0.5 + a.affection/200 + (a.fed?0.3:0);
    if(Math.random()<chance){ a.hasProduct=true; setProductMarker(a); }
    a.fed=false;
  }
  updateHUD();
}
function sleep(){
  S.time=6/24; S.energy=Math.min(maxEnergy(),100+ (level-1)*10);
  newDay(); SFX.sleep(); saveGame();
  flash('😴 一夜好眠… 第 '+S.day+' 天 ('+SEASONS[S.season]+')');
}
function refillEnergyWell(){ if(S.energy>=maxEnergy()){ toast('能量已满'); return;} S.energy=Math.min(maxEnergy(),S.energy+25); updateHUD(); SFX.water(); toast('☕ 在井边歇了歇 (+25 能量)'); }
function maxEnergy(){ return 100+(level-1)*10; }

function rollWeather(){
  const r=Math.random();
  if(S.season===3){ S.weather = r<0.4?'雪':(r<0.6?'雾':'晴'); }
  else if(S.season===0){ S.weather = r<0.35?'雨':(r<0.45?'雾':'晴'); }
  else if(S.season===1){ S.weather = r<0.2?'雨':'晴'; }
  else { S.weather = r<0.3?'雨':(r<0.4?'雾':'晴'); }
  // rain auto-waters crops next morning effect: water all crops
  if(S.weather==='雨'){ for(const k in S.tiles){ const t=S.tiles[k]; if(t.crop&&!t.dead){ t.watered=true; const [x,z]=k.split('_').map(Number); refreshTileVisual(x,z);} } }
  scene.fog.far = S.weather==='雾'?70:130;
  buildParticles();
}

const seasonGround=[0x6aa84f,0x5a9a3f,0x9a8a3a,0xdfe6ea];
function applySeason(){
  groundMat.color.setHex(seasonGround[S.season]);
  // tree foliage
  const leafCol=[0x6fae4a,0x4e8c3a,0xd98a30,0xcfe0e8][S.season];
  treeLeafMats.forEach(m=>m.color.setHex(leafCol));
  buildParticles();
  // season chip
  document.getElementById('seasonChip').innerHTML = SEASON_EMOJI[S.season]+' <b>'+SEASONS[S.season]+'</b>';
}

// ---------------- Save / Load ----------------
const SAVE_KEY='perpetual_garden_v1';
function saveGame(){
  const data={ money:S.money,energy:S.energy,day:S.day,season:S.season,time:S.time,weather:S.weather,
    seeds:S.seeds, inventory:S.inventory, tiles:S.tiles, level, xp,
    player:{x:player.position.x,z:player.position.z},
    animals:S.animals.map(a=>({type:a.type,x:a.mesh.position.x,z:a.mesh.position.z,affection:a.affection,hasProduct:a.hasProduct})),
    placed:S.placed.map(p=>({type:p.type,x:p.x,z:p.z})),
    ts:Date.now()
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  toast('💾 已保存');
}
function loadGame(){
  const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
  try{
    const d=JSON.parse(raw);
    S.money=d.money; S.energy=d.energy; S.day=d.day; S.season=d.season; S.time=d.time; S.weather=d.weather;
    S.seeds=d.seeds||S.seeds; S.inventory=d.inventory||{}; S.tiles=d.tiles||{}; level=d.level||1; xp=d.xp||0;
    if(d.player) player.position.set(d.player.x,0,d.player.z);
    // rebuild tiles
    for(const k in S.tiles){ const [x,z]=k.split('_').map(Number); refreshTileVisual(x,z); }
    // rebuild animals
    S.animals.forEach(a=>scene.remove(a.mesh)); S.animals=[];
    (d.animals||[]).forEach(a=>{ const na=a.type==='cow'?makeCow(a.x,a.z):makeChicken(a.x,a.z); na.affection=a.affection; na.hasProduct=a.hasProduct; setProductMarker(na); S.animals.push(na); });
    // rebuild placed
    S.placed.forEach(p=>scene.remove(p.mesh)); S.placed=[];
    (d.placed||[]).forEach(p=>{ S.buildSel=p.type; // reuse placeBuild without cost
      const w=worldFromTile(p.x,p.z); S.money+=BUILDABLES[p.type].cost; placeBuild(p.x,p.z); });
    applySeason(); buildParticles();
    return true;
  }catch(e){ console.warn(e); return false; }
}
function updateSaveInfo(){
  const raw=localStorage.getItem(SAVE_KEY);
  document.getElementById('saveInfo').textContent = raw? ('上次保存：'+new Date(JSON.parse(raw).ts).toLocaleString()) : '暂无存档';
}
document.getElementById('btnSave').onclick=()=>{ saveGame(); updateSaveInfo(); };
document.getElementById('btnReset').onclick=()=>{ if(confirm('确定重置所有进度？')){ localStorage.removeItem(SAVE_KEY); location.reload(); } };

// auto-save periodically
setInterval(()=>{ if(S.started) saveGame(); }, 60000);
addEventListener('beforeunload',()=>{ if(S.started) saveGame(); });

// ---------------- Movement & main loop ----------------
const clock=new THREE.Clock();
let walkPhase=0;
function update(dt){
  // ----- movement -----
  let mx=0,mz=0;
  if(keys.has('w')||keys.has('arrowup')) mz-=1;
  if(keys.has('s')||keys.has('arrowdown')) mz+=1;
  if(keys.has('a')||keys.has('arrowleft')) mx-=1;
  if(keys.has('d')||keys.has('arrowright')) mx+=1;
  if(touchMove){ mx+=Math.max(-1,Math.min(1,touchMove.dx/50)); mz+=Math.max(-1,Math.min(1,touchMove.dy/50)); }
  const moving=(mx||mz);
  const run=keys.has('shift');
  const speed=(run?9:5)*dt;
  if(moving){
    // movement relative to camera yaw
    const ang=Math.atan2(mx,mz)+camYaw;
    const dx=Math.sin(ang), dz=Math.cos(ang);
    let nx=player.position.x+dx*speed, nz=player.position.z+dz*speed;
    nx=Math.max(-HALF-30,Math.min(HALF+30,nx)); nz=Math.max(-HALF-30,Math.min(HALF+30,nz));
    player.position.x=nx; player.position.z=nz;
    playerFacing=ang;
    player.rotation.y=ang;
    walkPhase+=dt*(run?16:11);
    legL.rotation.x=Math.sin(walkPhase)*0.6; legR.rotation.x=-Math.sin(walkPhase)*0.6;
    armL.rotation.x=-Math.sin(walkPhase)*0.5; armR.rotation.x=Math.sin(walkPhase)*0.5;
    body.position.y=1.0+Math.abs(Math.sin(walkPhase))*0.04;
  } else {
    legL.rotation.x*=0.8; legR.rotation.x*=0.8; armL.rotation.x*=0.8; armR.rotation.x*=0.8;
  }

  // ----- camera -----
  const cx=player.position.x+Math.sin(camYaw)*camDist*Math.cos(camPitch);
  const cy=player.position.y+camDist*Math.sin(camPitch)+1;
  const cz=player.position.z+Math.cos(camYaw)*camDist*Math.cos(camPitch);
  camera.position.lerp(new THREE.Vector3(cx,cy,cz), 0.15);
  camera.lookAt(player.position.x, player.position.y+1.2, player.position.z);

  // ----- target tile highlight -----
  const tt=targetTile();
  if(tt && (S.tool!=='feed')){ const w=worldFromTile(tt.tx,tt.tz); hl.position.set(w.x,0.30,w.z); hl.visible=true; }
  else hl.visible=false;

  // ----- interaction hints -----
  const useK = isTouch ? '绿色按钮' : '<b>E</b>';
  let hint = isTouch ? '左半屏拖动 移动 · 右半屏拖动 转视角 · 点 ⬤ 使用工具'
                     : '移动 <b>WASD</b> · 转视角 <b>拖拽</b> · 工具 <b>E</b> · 切换 <b>1~6</b>';
  for(const z of interactZones){ if(player.position.distanceTo(z.pos)<z.r){ hint = z.hint.replace('按 E','点 '+useK).replace(' E ',' '+useK+' '); } }
  for(const a of S.animals){ if(player.position.distanceTo(a.mesh.position)<2.4){ hint = a.hasProduct? `点 ${useK} 收集 ${a.emoji}` : (S.tool==='feed'?`点 ${useK} 喂食`:`点 ${useK} 抚摸 🐾`); } }
  document.getElementById('helpText').innerHTML=hint;

  // ----- time of day -----
  S.time += dt/DAY_SECONDS;
  if(S.time>=1){ S.time-=1; // a full day passed without sleeping -> still advance crops lightly? keep simple: auto next day at midnight
    newDay(); }
  updateDayNightCycle();
  updateClock();

  // ----- animals AI -----
  for(const a of S.animals){
    a.productTimer-=dt;
    a.wanderT-=dt;
    if(a.wanderT<=0){ a.wanderT=2+Math.random()*3; a.vx=(Math.random()-0.5)*(a.type==='cow'?0.6:1.2); a.vz=(Math.random()-0.5)*(a.type==='cow'?0.6:1.2); }
    let nx=a.mesh.position.x+a.vx*dt, nz=a.mesh.position.z+a.vz*dt;
    if(a.mesh.position.distanceTo(a.home)>6){ a.vx=(a.home.x-a.mesh.position.x)*0.2; a.vz=(a.home.z-a.mesh.position.z)*0.2; }
    a.mesh.position.x=nx; a.mesh.position.z=nz;
    if(a.vx||a.vz) a.mesh.rotation.y=Math.atan2(a.vx,a.vz);
    a.mesh.position.y=Math.abs(Math.sin(performance.now()*0.004+a.home.x))*0.05; // little bob
    if(a.marker) a.marker.position.y=(a.type==='chicken'?1.1:1.7)+Math.sin(performance.now()*0.003)*0.1;
  }

  // ----- particles -----
  if(particleSys){
    const p=particleSys.geometry.attributes.position; const arr=p.array; const kind=particleSys.userData.kind;
    for(let i=0;i<arr.length;i+=3){
      if(kind==='rain'){ arr[i+1]-=dt*40; arr[i]-=dt*4; }
      else if(kind==='snow'){ arr[i+1]-=dt*4; arr[i]+=Math.sin(performance.now()*0.001+i)*dt*1.5; }
      else { arr[i+1]-=dt*3; arr[i]+=Math.sin(performance.now()*0.0008+i)*dt*2; arr[i+2]+=Math.cos(performance.now()*0.0006+i)*dt; }
      if(arr[i+1]<0){ arr[i+1]=40; arr[i]=(Math.random()-0.5)*120; arr[i+2]=(Math.random()-0.5)*120; }
    }
    p.needsUpdate=true;
    particleSys.position.x=player.position.x; particleSys.position.z=player.position.z;
  }
  // fireflies follow + flicker at night
  const night = S.time>0.8||S.time<0.22;
  fireflies.material.opacity = THREE.MathUtils.lerp(fireflies.material.opacity, (night&&S.weather==='晴')?0.9:0, 0.05);
  fireflies.position.set(player.position.x, 0, player.position.z);
  const fp=fireflies.geometry.attributes.position;
  for(let i=0;i<fp.array.length;i+=3){ fp.array[i]+=Math.sin(performance.now()*0.001+i)*dt*0.6; fp.array[i+1]+=Math.cos(performance.now()*0.0013+i)*dt*0.4; }
  fp.needsUpdate=true;

  // ----- lantern lights at night -----
  for(const p of S.placed){ if(p.type==='lantern'&&p.mesh.userData.light){ p.mesh.userData.light.intensity = night?1.6:0; } }

  // ----- windmill spin -----
  wmHub.rotation.z += dt*0.8;
  // river shimmer
  river.material.opacity=0.8+Math.sin(performance.now()*0.001)*0.05;

  // ----- pops -----
  for(let i=pops.length-1;i>=0;i--){ const pp=pops[i]; pp.t+=dt;
    pp.g.children.forEach(c=>{ c.userData.v.y-=9*dt; c.position.addScaledVector(c.userData.v,dt); c.material.opacity=Math.max(0,1-pp.t); c.material.transparent=true; });
    if(pp.t>1){ scene.remove(pp.g); pops.splice(i,1); }
  }

  // toast timer
  if(toastT>0){ toastT-=dt; if(toastT<=0) elToast.classList.remove('show'); }
}

function updateDayNightCycle(){
  // sun angle based on time (0=midnight)
  const a=(S.time-0.25)*Math.PI*2; // sunrise ~0.25
  const sx=Math.cos(a)*60, sy=Math.sin(a)*60, sz=20;
  sun.position.set(sx, Math.max(-20,sy), sz);
  sun.target.position.copy(player.position);
  const daylight=Math.max(0, Math.sin(a)); // 0 at night, 1 at noon
  sun.intensity=daylight*2.2;
  hemi.intensity=0.25+daylight*0.75;
  moon.position.set(-sx,Math.max(0,-sy),sz); moon.intensity=(1-daylight)*0.25;
  // sky colors
  const dayTop=new THREE.Color(0x3a7bd5), dayBot=new THREE.Color(0xcfe8ff);
  const nightTop=new THREE.Color(0x0a1030), nightBot=new THREE.Color(0x1a2548);
  const duskTop=new THREE.Color(0xc85a3a), duskBot=new THREE.Color(0xf2a060);
  let top,bot;
  const dusk=Math.pow(1-Math.abs(daylight-0.15)/0.15,2); // near horizon glow
  if(daylight>0.25){ top=dayTop.clone(); bot=dayBot.clone(); }
  else { const f=daylight/0.25; top=nightTop.clone().lerp(daylight>0.05?duskTop:dayTop,f); bot=nightBot.clone().lerp(duskBot,f); }
  skyMat.uniforms.top.value.copy(top); skyMat.uniforms.bot.value.copy(bot);
  scene.fog.color.copy(bot);
  starMat.opacity=Math.max(0,1-daylight*3);
  // vignette darkness
  const dark=Math.max(0, 1-daylight*2);
  document.getElementById('vignette').style.boxShadow=`inset 0 0 220px rgba(0,0,30,${dark*0.6})`;
  renderer.toneMappingExposure = 0.7+daylight*0.5;
}

// ---------------- Loop ----------------
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(0.05, clock.getDelta());
  if(S.started && !S.paused){ update(dt); ambientMusic(dt); }
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// ---------------- Boot ----------------
function startGame(fromSave){
  S.started=true;
  document.getElementById('hud').style.display='block';
  closeModal('menuModal');
  applySeason(); updateHUD(); renderHotbar(); buildParticles();
  if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  toast(fromSave?'欢迎回到田园 🌾':'欢迎来到永续田园！锄地(1)→播种(2)→浇水(3)→收获(4)');
}
document.getElementById('btnStart').onclick=()=>{ startGame(false); };

// ---------------- Touch / mobile controls ----------------
const isTouch = matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window || navigator.maxTouchPoints>0;
if(isTouch) document.body.classList.add('touch');
const actBtn=document.getElementById('actBtn');
// use pointerdown so it fires instantly and never gets swallowed by the canvas look-drag
actBtn.addEventListener('pointerdown', e=>{ e.preventDefault(); e.stopPropagation(); if(S.started&&!S.paused) interact(); }, {passive:false});
actBtn.addEventListener('touchstart', e=>{ e.preventDefault(); e.stopPropagation(); }, {passive:false});

// loader sequence
const lb=document.getElementById('loadbar'), tip=document.getElementById('loadtip');
const tips=['正在播种世界…','点亮晨光…','唤醒农场动物…','铺设田垄…','准备就绪！'];
let lp=0;
const li=setInterval(()=>{
  lp+=20; lb.style.width=lp+'%'; tip.textContent=tips[Math.min(tips.length-1,Math.floor(lp/20))];
  if(lp>=100){ clearInterval(li);
    setTimeout(()=>{
      const loader=document.getElementById('loader'); loader.style.opacity='0'; setTimeout(()=>loader.style.display='none',800);
      const had=loadGame();
      updateSaveInfo();
      if(had){ // auto-resume
        document.getElementById('menuModal').classList.remove('show');
        startGame(true);
      } else {
        document.getElementById('menuModal').classList.add('show');
      }
    }, 300);
  }
},220);

// ---------------- PWA ----------------
if('serviceWorker' in navigator){ addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }

// expose for debugging
window.__garden=S;
</script>
